name: Update kitten data

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC (2am Eastern)
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch kittens and geocode new addresses
        run: node .github/scripts/update-coords.js

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add animals.json coords.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update kitten data $(date -u '+%Y-%m-%d')"
            git push
          fi
