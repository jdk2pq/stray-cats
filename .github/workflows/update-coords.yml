name: Update kitten data

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC (2am Eastern)
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch kittens and geocode new addresses
        env:
          GOOGLE_GEOCODING_KEY: ${{ secrets.GOOGLE_GEOCODING_KEY }}
        run: node .github/scripts/update-coords.js

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add animals.json dc-cats.json coords.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update kitten data $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Check for geocode failures
        id: check_failures
        run: |
          if [ -s geocode-failures.txt ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Send geocode failure alert
        if: steps.check_failures.outputs.has_failures == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "DC Kitten Finder — geocoding failure on ${{ github.run_id }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: DC Kitten Finder <${{ secrets.ALERT_EMAIL }}>
          body: file://geocode-failures.txt
